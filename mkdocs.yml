site_name: AI Paper Analysis
site_description: AI 前沿论文中文深度解读
site_url: https://shibing624.github.io/ai-paper-analysis/
site_author: shibing624
repo_url: https://github.com/shibing624/ai-paper-analysis
repo_name: shibing624/ai-paper-analysis
edit_uri: edit/main/
docs_dir: docs
site_dir: site
theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
  - python
  - yaml
  - bash
  - json
  - go
  - rust
  navigation_depth: 2
  collapse_navigation: true
  titles_only: true
  sticky_navigation: true
  include_homepage_in_sidebar: true
  prev_next_buttons_location: both
  locale: zh_CN
markdown_extensions:
- admonition
- footnotes
- tables
- attr_list
- md_in_html
- def_list
- toc
- pymdownx.highlight:
    anchor_linenums: true
    line_spans: __span
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences
- pymdownx.details
- pymdownx.tabbed
- pymdownx.tasklist
- pymdownx.arithmatex:
    generic: true
plugins:
- search:
    lang: zh
- minify:
    minify_html: true
    minify_js: true
    minify_css: true
    htmlmin_opts:
      remove_comments: true
extra_css:
- assets/extra.css
extra_javascript:
- assets/right-toc.js
- assets/mathjax-on-demand.js
