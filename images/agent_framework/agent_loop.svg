<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 500">
  <defs>
    <linearGradient id="loopGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="loopGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="loopGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="750" height="500" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="375" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Agent Loop：核心引擎</text>
  <text x="375" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#64748b">本质是一个 While 循环，直到任务完成退出</text>
  
  <!-- Main loop container -->
  <rect x="50" y="90" width="650" height="380" rx="20" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow3)"/>
  <text x="375" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#475569">while not task_completed:</text>
  
  <!-- Step 1: User Input / Context -->
  <rect x="100" y="145" width="180" height="60" rx="10" fill="url(#loopGrad1)" filter="url(#shadow3)"/>
  <text x="190" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">📥 读取上下文</text>
  <text x="190" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#dbeafe">System + User + History</text>
  
  <!-- Arrow 1 -->
  <path d="M285 175 L330 175" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowBlue)"/>
  
  <!-- Step 2: LLM Reasoning -->
  <rect x="340" y="145" width="180" height="60" rx="10" fill="url(#loopGrad1)" filter="url(#shadow3)"/>
  <text x="430" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">🧠 LLM 推理</text>
  <text x="430" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#dbeafe">思考 → 决策</text>
  
  <!-- Arrow 2 -->
  <path d="M525 175 L570 175" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowBlue)"/>
  
  <!-- Decision diamond -->
  <polygon points="630,145 665,175 630,205 595,175" fill="#f59e0b" filter="url(#shadow3)"/>
  <text x="630" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">工具?</text>
  
  <!-- Branch: No tool call - Complete -->
  <path d="M665 175 L695 175" stroke="#10b981" stroke-width="2"/>
  <rect x="540" y="230" width="150" height="45" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <text x="615" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">✅ 返回结果</text>
  <text x="615" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">任务完成，退出循环</text>
  <path d="M665 175 L665 195 L615 195 L615 225" stroke="#10b981" stroke-width="2" fill="none"/>
  <text x="680" y="190" font-family="Arial, sans-serif" font-size="10" fill="#10b981">No</text>
  
  <!-- Branch: Has tool call -->
  <path d="M630 205 L630 255" stroke="#f59e0b" stroke-width="2"/>
  <text x="645" y="235" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b">Yes</text>
  
  <!-- Step 3: Execute Tool -->
  <rect x="100" y="290" width="180" height="60" rx="10" fill="url(#loopGrad2)" filter="url(#shadow3)"/>
  <text x="190" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">🔧 执行工具</text>
  <text x="190" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d1fae5">Shell / File / Python</text>
  
  <!-- Arrow from decision to tool -->
  <path d="M630 260 L630 320 L285 320" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  
  <!-- Step 4: Get Result -->
  <rect x="340" y="290" width="180" height="60" rx="10" fill="url(#loopGrad2)" filter="url(#shadow3)"/>
  <text x="430" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">📋 获取结果</text>
  <text x="430" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d1fae5">工具返回值</text>
  
  <!-- Arrow 4 -->
  <path d="M285 320 L335 320" stroke="#10b981" stroke-width="3" marker-end="url(#arrowGreen)"/>
  
  <!-- Step 5: Update Context -->
  <rect x="220" y="390" width="200" height="55" rx="10" fill="url(#loopGrad3)" filter="url(#shadow3)"/>
  <text x="320" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">🔄 更新上下文</text>
  <text x="320" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fef3c7">追加 tool result 到 messages</text>
  
  <!-- Arrow 5 -->
  <path d="M430 355 L430 395 L425 395" stroke="#10b981" stroke-width="2" fill="none"/>
  
  <!-- Loop back arrow -->
  <path d="M215 417 L80 417 L80 175 L95 175" stroke="#ef4444" stroke-width="3" fill="none" stroke-dasharray="8,4" marker-end="url(#arrowBlue)"/>
  <text x="80" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef4444" transform="rotate(-90, 80, 300)">继续循环</text>
  
  <!-- Turn counter -->
  <rect x="450" y="395" width="100" height="40" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="500" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#991b1b">安全上限</text>
  <text x="500" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">MAX_TURNS=20</text>
</svg>
