<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="langchainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="llamaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="autogenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crewGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="langgraphGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="480" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Agent 框架选型指南</text>
  <text x="400" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#64748b">没有银弹，按需选择</text>
  
  <!-- Decision question -->
  <rect x="280" y="85" width="240" height="40" rx="20" fill="#1e293b"/>
  <text x="400" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">🤔 你的核心需求是？</text>
  
  <!-- Row 1 -->
  <!-- LangChain -->
  <g transform="translate(30, 150)">
    <rect width="230" height="130" rx="12" fill="white" filter="url(#cardShadow)"/>
    <rect width="230" height="40" rx="12" fill="url(#langchainGrad)"/>
    <rect x="0" y="28" width="230" height="12" fill="url(#langchainGrad)"/>
    <text x="115" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">🔗 LangChain</text>
    <text x="115" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">快速出原型</text>
    <text x="115" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">工具链丰富，文档完善</text>
    <text x="115" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">社区活跃，集成多</text>
    <rect x="70" y="112" width="90" height="22" rx="4" fill="#dcfce7"/>
    <text x="115" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">⭐ 入门首选</text>
  </g>
  
  <!-- LlamaIndex -->
  <g transform="translate(285, 150)">
    <rect width="230" height="130" rx="12" fill="white" filter="url(#cardShadow)"/>
    <rect width="230" height="40" rx="12" fill="url(#llamaGrad)"/>
    <rect x="0" y="28" width="230" height="12" fill="url(#llamaGrad)"/>
    <text x="115" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">🦙 LlamaIndex</text>
    <text x="115" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6d28d9">构建 RAG 应用</text>
    <text x="115" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">专注数据索引和检索</text>
    <text x="115" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">知识密集型场景</text>
    <rect x="60" y="112" width="110" height="22" rx="4" fill="#f3e8ff"/>
    <text x="115" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6d28d9">⭐ RAG 强推</text>
  </g>
  
  <!-- AutoGen -->
  <g transform="translate(540, 150)">
    <rect width="230" height="130" rx="12" fill="white" filter="url(#cardShadow)"/>
    <rect width="230" height="40" rx="12" fill="url(#autogenGrad)"/>
    <rect x="0" y="28" width="230" height="12" fill="url(#autogenGrad)"/>
    <text x="115" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">🤖 AutoGen</text>
    <text x="115" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0369a1">多 Agent 对话协作</text>
    <text x="115" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">微软出品</text>
    <text x="115" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Agent 间通信机制成熟</text>
    <rect x="60" y="112" width="110" height="22" rx="4" fill="#e0f2fe"/>
    <text x="115" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0369a1">多Agent协作</text>
  </g>
  
  <!-- Row 2 -->
  <!-- CrewAI -->
  <g transform="translate(30, 310)">
    <rect width="230" height="130" rx="12" fill="white" filter="url(#cardShadow)"/>
    <rect width="230" height="40" rx="12" fill="url(#crewGrad)"/>
    <rect x="0" y="28" width="230" height="12" fill="url(#crewGrad)"/>
    <text x="115" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">👥 CrewAI</text>
    <text x="115" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c2410c">角色扮演协作</text>
    <text x="115" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">模拟团队协作场景</text>
    <text x="115" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">角色定义直观</text>
    <rect x="60" y="112" width="110" height="22" rx="4" fill="#ffedd5"/>
    <text x="115" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c2410c">团队模拟</text>
  </g>
  
  <!-- LangGraph -->
  <g transform="translate(285, 310)">
    <rect width="230" height="130" rx="12" fill="white" filter="url(#cardShadow)"/>
    <rect width="230" height="40" rx="12" fill="url(#langgraphGrad)"/>
    <rect x="0" y="28" width="230" height="12" fill="url(#langgraphGrad)"/>
    <text x="115" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">📊 LangGraph</text>
    <text x="115" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#be185d">复杂流程控制</text>
    <text x="115" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">状态图框架</text>
    <text x="115" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">精细的状态管理</text>
    <rect x="60" y="112" width="110" height="22" rx="4" fill="#fce7f3"/>
    <text x="115" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#be185d">⭐ Workflow首选</text>
  </g>
  
  <!-- Semantic Kernel -->
  <g transform="translate(540, 310)">
    <rect width="230" height="130" rx="12" fill="white" filter="url(#cardShadow)"/>
    <rect width="230" height="40" rx="12" fill="url(#skGrad)"/>
    <rect x="0" y="28" width="230" height="12" fill="url(#skGrad)"/>
    <text x="115" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">🔷 Semantic Kernel</text>
    <text x="115" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4338ca">.NET 生态</text>
    <text x="115" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">微软轻量级框架</text>
    <text x="115" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Azure 集成良好</text>
    <rect x="60" y="112" width="110" height="22" rx="4" fill="#e0e7ff"/>
    <text x="115" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4338ca">C#/.NET 团队</text>
  </g>
  
  <!-- Bottom tip -->
  <rect x="200" y="455" width="400" height="22" rx="6" fill="#fef3c7"/>
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">💡 建议：先理解原理，自己写一遍极简版本，再按需引入框架</text>
</svg>
