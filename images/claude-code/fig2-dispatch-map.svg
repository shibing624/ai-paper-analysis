<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380">
  <!-- Background -->
  <rect width="720" height="380" fill="#F7FAFC" rx="12"/>

  <!-- Title -->
  <text x="360" y="34" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="bold" fill="#1A202C">Dispatch Map — 工具扩展架构</text>

  <!-- Loop (left) -->
  <rect x="30" y="60" width="160" height="240" rx="8" fill="#EBF8FF" stroke="#3182CE" stroke-width="2"/>
  <text x="110" y="84" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#2B6CB0">Agent Loop</text>
  <text x="110" y="104" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#4299E1">（永远不变）</text>
  <rect x="50" y="115" width="120" height="28" rx="4" fill="#BEE3F8" stroke="#63B3ED" stroke-width="1"/>
  <text x="110" y="134" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2C5282">while True:</text>
  <rect x="50" y="153" width="120" height="28" rx="4" fill="#BEE3F8" stroke="#63B3ED" stroke-width="1"/>
  <text x="110" y="172" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2C5282">LLM call</text>
  <rect x="50" y="191" width="120" height="28" rx="4" fill="#BEE3F8" stroke="#63B3ED" stroke-width="1"/>
  <text x="110" y="210" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#2C5282">handler(**block.input)</text>
  <rect x="50" y="229" width="120" height="28" rx="4" fill="#BEE3F8" stroke="#63B3ED" stroke-width="1"/>
  <text x="110" y="248" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2C5282">append result</text>

  <!-- Arrow Loop → Dispatch -->
  <line x1="192" y1="180" x2="238" y2="180" stroke="#4A5568" stroke-width="2" marker-end="url(#arr)"/>
  <text x="215" y="172" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#718096">查找</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4A5568"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#DD6B20"/>
    </marker>
  </defs>

  <!-- Dispatch Map (center) -->
  <rect x="242" y="60" width="200" height="240" rx="8" fill="#FFFAF0" stroke="#DD6B20" stroke-width="2"/>
  <text x="342" y="84" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#9C4221">TOOL_HANDLERS</text>
  <text x="342" y="100" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#C05621">{ tool_name: handler }</text>

  <rect x="258" y="112" width="168" height="26" rx="4" fill="#FEEBC8" stroke="#F6AD55" stroke-width="1"/>
  <text x="342" y="130" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#7B341E">"bash" → run_bash()</text>

  <rect x="258" y="146" width="168" height="26" rx="4" fill="#FEEBC8" stroke="#F6AD55" stroke-width="1"/>
  <text x="342" y="164" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#7B341E">"read_file" → run_read()</text>

  <rect x="258" y="180" width="168" height="26" rx="4" fill="#FEEBC8" stroke="#F6AD55" stroke-width="1"/>
  <text x="342" y="198" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#7B341E">"write_file" → run_write()</text>

  <rect x="258" y="214" width="168" height="26" rx="4" fill="#FEEBC8" stroke="#F6AD55" stroke-width="1"/>
  <text x="342" y="232" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#7B341E">"edit_file" → run_edit()</text>

  <text x="342" y="264" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#C05621">+</text>
  <text x="342" y="284" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#DD6B20">加工具 = 字典加一行</text>

  <!-- Arrow Dispatch → Handlers -->
  <line x1="444" y1="180" x2="488" y2="180" stroke="#DD6B20" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- Handlers (right) -->
  <rect x="492" y="60" width="200" height="240" rx="8" fill="#F0FFF4" stroke="#38A169" stroke-width="2"/>
  <text x="592" y="84" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#276749">Handler 函数</text>

  <rect x="508" y="100" width="168" height="36" rx="4" fill="#C6F6D5" stroke="#68D391" stroke-width="1"/>
  <text x="592" y="116" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#22543D">run_bash(command)</text>
  <text x="592" y="130" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#276749">无路径限制</text>

  <rect x="508" y="146" width="168" height="36" rx="4" fill="#C6F6D5" stroke="#68D391" stroke-width="1"/>
  <text x="592" y="162" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#22543D">run_read(path, limit)</text>
  <text x="592" y="176" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#276749">safe_path() 沙箱保护</text>

  <rect x="508" y="192" width="168" height="36" rx="4" fill="#C6F6D5" stroke="#68D391" stroke-width="1"/>
  <text x="592" y="208" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#22543D">run_write / run_edit</text>
  <text x="592" y="222" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#276749">路径沙箱 + 原子操作</text>

  <rect x="508" y="238" width="168" height="36" rx="4" fill="#BEE3F8" stroke="#63B3ED" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="592" y="254" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#2C5282">new_tool() ← 未来扩展</text>
  <text x="592" y="268" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#3182CE">只需加字典+handler</text>

  <!-- Safe path note -->
  <rect x="30" y="320" width="660" height="44" rx="6" fill="#FFF5F5" stroke="#FC8181" stroke-width="1.5"/>
  <text x="360" y="339" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#C53030">安全边界：safe_path() 防止路径逃逸</text>
  <text x="360" y="356" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#E53E3E">若 path.resolve() 不在 WORKDIR 内 → 直接抛异常，拒绝执行</text>
</svg>
