<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#4A5568"/>
    </marker>
    <marker id="a-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#E53E3E"/>
    </marker>
    <marker id="a-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#38A169"/>
    </marker>
  </defs>

  <rect width="720" height="420" fill="#F7FAFC" rx="12"/>
  <text x="360" y="34" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="bold" fill="#1A202C">TodoWrite — 任务规划与防偏航机制</text>

  <!-- States legend -->
  <rect x="30" y="54" width="16" height="16" rx="3" fill="#E9D8FD" stroke="#805AD5" stroke-width="1.5"/>
  <text x="52" y="66" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#553C9A">pending</text>
  <rect x="120" y="54" width="16" height="16" rx="3" fill="#FEEBC8" stroke="#DD6B20" stroke-width="1.5"/>
  <text x="142" y="66" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9C4221">in_progress</text>
  <rect x="240" y="54" width="16" height="16" rx="3" fill="#C6F6D5" stroke="#38A169" stroke-width="1.5"/>
  <text x="262" y="66" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#276749">completed</text>

  <!-- Phase 1: Initial -->
  <rect x="30" y="90" width="140" height="130" rx="8" fill="#F8F4FF" stroke="#805AD5" stroke-width="1.5"/>
  <text x="100" y="110" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="bold" fill="#553C9A">第一轮：生成计划</text>
  <rect x="44" y="120" width="112" height="22" rx="4" fill="#E9D8FD" stroke="#B794F4" stroke-width="1"/>
  <text x="100" y="136" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#553C9A">[ ] 步骤 1 (pending)</text>
  <rect x="44" y="148" width="112" height="22" rx="4" fill="#E9D8FD" stroke="#B794F4" stroke-width="1"/>
  <text x="100" y="164" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#553C9A">[ ] 步骤 2 (pending)</text>
  <rect x="44" y="176" width="112" height="22" rx="4" fill="#E9D8FD" stroke="#B794F4" stroke-width="1"/>
  <text x="100" y="192" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#553C9A">[ ] 步骤 3 (pending)</text>

  <!-- Arrow 1→2 -->
  <line x1="172" y1="155" x2="208" y2="155" stroke="#4A5568" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Phase 2: Working -->
  <rect x="210" y="90" width="150" height="130" rx="8" fill="#FFFAF0" stroke="#DD6B20" stroke-width="1.5"/>
  <text x="285" y="110" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="bold" fill="#9C4221">第二轮：执行步骤1</text>
  <rect x="224" y="120" width="122" height="22" rx="4" fill="#C6F6D5" stroke="#68D391" stroke-width="1"/>
  <text x="285" y="136" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#22543D">[x] 步骤 1 (completed)</text>
  <rect x="224" y="148" width="122" height="22" rx="4" fill="#FEEBC8" stroke="#F6AD55" stroke-width="1.5"/>
  <text x="285" y="164" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" font-weight="bold" fill="#7B341E">[&gt;] 步骤 2 (in_progress)</text>
  <rect x="224" y="176" width="122" height="22" rx="4" fill="#E9D8FD" stroke="#B794F4" stroke-width="1"/>
  <text x="285" y="192" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#553C9A">[ ] 步骤 3 (pending)</text>

  <!-- Arrow 2→3 -->
  <line x1="362" y1="155" x2="398" y2="155" stroke="#4A5568" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- Phase 3: Done -->
  <rect x="400" y="90" width="150" height="130" rx="8" fill="#F0FFF4" stroke="#38A169" stroke-width="1.5"/>
  <text x="475" y="110" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="bold" fill="#276749">第三轮：全部完成</text>
  <rect x="414" y="120" width="122" height="22" rx="4" fill="#C6F6D5" stroke="#68D391" stroke-width="1"/>
  <text x="475" y="136" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#22543D">[x] 步骤 1 (completed)</text>
  <rect x="414" y="148" width="122" height="22" rx="4" fill="#C6F6D5" stroke="#68D391" stroke-width="1"/>
  <text x="475" y="164" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#22543D">[x] 步骤 2 (completed)</text>
  <rect x="414" y="176" width="122" height="22" rx="4" fill="#C6F6D5" stroke="#68D391" stroke-width="1"/>
  <text x="475" y="192" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#22543D">[x] 步骤 3 (completed)</text>

  <!-- Nag Reminder mechanism -->
  <rect x="30" y="248" width="640" height="88" rx="8" fill="#FFF5F5" stroke="#E53E3E" stroke-width="2"/>
  <text x="360" y="268" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#C53030">Nag Reminder — 防偏航机制</text>

  <rect x="50" y="278" width="180" height="46" rx="5" fill="#FED7D7" stroke="#FC8181" stroke-width="1"/>
  <text x="140" y="296" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9B2C2C">连续 3 轮未更新 todo</text>
  <text x="140" y="312" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#C53030">rounds_since_todo ≥ 3</text>

  <line x1="232" y1="301" x2="278" y2="301" stroke="#E53E3E" stroke-width="1.8" marker-end="url(#a-red)"/>

  <rect x="282" y="278" width="210" height="46" rx="5" fill="#FED7D7" stroke="#FC8181" stroke-width="1"/>
  <text x="387" y="296" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9B2C2C">注入 &lt;reminder&gt; 到</text>
  <text x="387" y="312" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#C53030">下一轮 tool_result 前面</text>

  <line x1="494" y1="301" x2="534" y2="301" stroke="#E53E3E" stroke-width="1.8" marker-end="url(#a-red)"/>

  <rect x="538" y="278" width="116" height="46" rx="5" fill="#FED7D7" stroke="#FC8181" stroke-width="1"/>
  <text x="596" y="296" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9B2C2C">模型被迫更新</text>
  <text x="596" y="312" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#C53030">计划重新对焦</text>

  <!-- Key rule -->
  <rect x="30" y="354" width="640" height="46" rx="6" fill="#FEFCBF" stroke="#D69E2E" stroke-width="1.5"/>
  <text x="360" y="372" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#744210">关键约束：同一时刻只能有一个 in_progress</text>
  <text x="360" y="389" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#975A16">若同时标记多个 in_progress → 直接抛异常，强制"串行聚焦"</text>
</svg>
