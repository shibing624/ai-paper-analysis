<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A5568"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3182CE"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38A169"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" fill="#F7FAFC" rx="12"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#1A202C">Claude Code Agent Loop — 核心运行机制</text>

  <!-- User Box -->
  <rect x="40" y="80" width="120" height="56" rx="8" fill="#EBF8FF" stroke="#3182CE" stroke-width="2"/>
  <text x="100" y="106" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#2B6CB0">User</text>
  <text x="100" y="124" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#4A90D9">prompt / query</text>

  <!-- LLM Box -->
  <rect x="290" y="80" width="140" height="56" rx="8" fill="#F0FFF4" stroke="#38A169" stroke-width="2"/>
  <text x="360" y="104" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#276749">LLM</text>
  <text x="360" y="122" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#2F855A">Claude API</text>

  <!-- Tool Box -->
  <rect x="545" y="80" width="130" height="56" rx="8" fill="#FFFAF0" stroke="#DD6B20" stroke-width="2"/>
  <text x="610" y="104" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#9C4221">Tool Execute</text>
  <text x="610" y="122" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#C05621">bash / read / write</text>

  <!-- User → LLM arrow -->
  <line x1="162" y1="108" x2="288" y2="108" stroke="#4A5568" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="225" y="100" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#718096">messages[]</text>

  <!-- LLM → Tool arrow -->
  <line x1="432" y1="108" x2="543" y2="108" stroke="#4A5568" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="487" y="100" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#718096">tool_use</text>

  <!-- Tool → LLM feedback (curved bottom) -->
  <path d="M 610 138 Q 610 220 360 220 Q 290 220 290 158" fill="none" stroke="#3182CE" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrow-blue)"/>
  <text x="480" y="240" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#3182CE">tool_result 追加到 messages[]</text>

  <!-- Loop indicator -->
  <rect x="240" y="265" width="240" height="40" rx="6" fill="#EEF" stroke="#805AD5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="360" y="283" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#553C9A" font-weight="bold">while True</text>
  <text x="360" y="298" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#6B46C1">循环直到 stop_reason ≠ "tool_use"</text>

  <!-- Exit condition box -->
  <rect x="540" y="270" width="150" height="50" rx="6" fill="#FFF5F5" stroke="#E53E3E" stroke-width="1.5"/>
  <text x="615" y="290" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="bold" fill="#C53030">stop_reason</text>
  <text x="615" y="306" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#E53E3E">≠ "tool_use" → 退出</text>

  <!-- LLM to exit -->
  <line x1="430" y1="136" x2="430" y2="285" stroke="#E53E3E" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Step annotations -->
  <text x="40" y="175" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#718096">① 用户 prompt 进入 messages[]</text>
  <text x="40" y="195" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#718096">② LLM 决策：调工具 or 直接回复</text>
  <text x="40" y="215" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#718096">③ 工具执行，结果追加 messages[]</text>
  <text x="40" y="235" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#718096">④ 回到 ② 继续，直到不需要工具</text>

  <!-- Key insight -->
  <rect x="40" y="330" width="640" height="46" rx="6" fill="#FEFCBF" stroke="#D69E2E" stroke-width="1.5"/>
  <text x="360" y="350" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="bold" fill="#744210">核心洞察：messages[] 是累积的——LLM 能看到自己所有的历史决策</text>
  <text x="360" y="367" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#975A16">控制权交给模型：它说"不需要工具了"，循环才退出</text>
</svg>
