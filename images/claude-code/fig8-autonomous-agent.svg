<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#4A5568"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#38A169"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#E53E3E"/>
    </marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#DD6B20"/>
    </marker>
  </defs>
  <rect width="760" height="420" fill="#F7FAFC" rx="12"/>
  <text x="380" y="34" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="bold" fill="#1A202C">自治 Agent 生命周期状态机</text>

  <!-- SPAWN -->
  <rect x="320" y="58" width="120" height="44" rx="8" fill="#E9D8FD" stroke="#805AD5" stroke-width="2"/>
  <text x="380" y="85" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#553C9A">SPAWN</text>
  <line x1="380" y1="104" x2="380" y2="134" stroke="#4A5568" stroke-width="2" marker-end="url(#a)"/>

  <!-- WORK -->
  <rect x="300" y="138" width="160" height="56" rx="8" fill="#C6F6D5" stroke="#38A169" stroke-width="2.5"/>
  <text x="380" y="162" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#22543D">WORK</text>
  <text x="380" y="182" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#276749">LLM 推理 + 工具执行</text>

  <!-- WORK self-loop (tool_use) -->
  <path d="M 462 158 Q 530 140 530 168 Q 530 196 462 178" fill="none" stroke="#38A169" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="548" y="168" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#38A169">tool_use</text>

  <!-- WORK → IDLE -->
  <line x1="380" y1="196" x2="380" y2="240" stroke="#4A5568" stroke-width="2" marker-end="url(#a)"/>
  <text x="420" y="224" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#718096">stop / idle工具</text>

  <!-- IDLE -->
  <rect x="290" y="244" width="180" height="56" rx="8" fill="#FEEBC8" stroke="#DD6B20" stroke-width="2"/>
  <text x="380" y="268" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="bold" fill="#9C4221">IDLE</text>
  <text x="380" y="286" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#C05621">每 5s 轮询，最长 60s</text>

  <!-- IDLE → WORK (inbox) -->
  <path d="M 290 262 Q 170 220 220 175 Q 260 150 298 158" fill="none" stroke="#38A169" stroke-width="1.8" marker-end="url(#ag)"/>
  <text x="178" y="214" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#276749">收件箱有消息</text>

  <!-- IDLE → WORK (task claim) -->
  <path d="M 290 278 Q 160 300 160 250 Q 160 190 300 172" fill="none" stroke="#DD6B20" stroke-width="1.8" marker-end="url(#ao)"/>
  <text x="130" y="268" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#9C4221">认领未分配任务</text>

  <!-- IDLE → SHUTDOWN -->
  <line x1="380" y1="302" x2="380" y2="345" stroke="#E53E3E" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="430" y="330" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#E53E3E">60s 无响应</text>

  <!-- SHUTDOWN -->
  <rect x="310" y="349" width="140" height="44" rx="8" fill="#FED7D7" stroke="#E53E3E" stroke-width="2"/>
  <text x="380" y="376" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="bold" fill="#C53030">SHUTDOWN</text>

  <!-- Worktree note (right) -->
  <rect x="570" y="60" width="170" height="300" rx="8" fill="#EBF8FF" stroke="#3182CE" stroke-width="1.5"/>
  <text x="655" y="82" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="bold" fill="#2B6CB0">Worktree 隔离</text>
  <text x="655" y="100" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#4299E1">每任务独立目录</text>

  <rect x="584" y="114" width="142" height="36" rx="4" fill="#BEE3F8" stroke="#63B3ED" stroke-width="1"/>
  <text x="655" y="130" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#2C5282">task_1 ↔ auth-refactor/</text>
  <text x="655" y="144" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#3182CE">branch: wt/auth-refactor</text>

  <rect x="584" y="160" width="142" height="36" rx="4" fill="#BEE3F8" stroke="#63B3ED" stroke-width="1"/>
  <text x="655" y="176" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#2C5282">task_2 ↔ ui-login/</text>
  <text x="655" y="190" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#3182CE">branch: wt/ui-login</text>

  <text x="655" y="224" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" font-weight="bold" fill="#2B6CB0">同时修改不同文件</text>
  <text x="655" y="242" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#4299E1">互不污染 ✓</text>
  <text x="655" y="264" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#2B6CB0">完成 → remove()</text>
  <text x="655" y="282" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#4299E1">自动标记 completed</text>
  <text x="655" y="304" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#2B6CB0">事件写 events.jsonl</text>
  <text x="655" y="320" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#4299E1">崩溃可恢复 ✓</text>
  <text x="655" y="348" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="9" fill="#718096">.worktrees/index.json</text>

  <!-- Identity re-injection note -->
  <rect x="30" y="376" width="520" height="34" rx="6" fill="#FEFCBF" stroke="#D69E2E" stroke-width="1.5"/>
  <text x="270" y="398" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="bold" fill="#744210">压缩后身份重注入：若 len(messages) ≤ 3，在开头插入 &lt;identity&gt; 块，防止"失忆"</text>
</svg>
