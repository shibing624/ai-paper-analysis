<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141e30"/>
      <stop offset="100%" style="stop-color:#243b55"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a6f"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#51cf66"/>
      <stop offset="100%" style="stop-color:#43e97b"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd43b"/>
      <stop offset="100%" style="stop-color:#fab005"/>
    </linearGradient>
    <filter id="sh4">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="900" height="400" fill="url(#bg4)" rx="16"/>
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold" font-family="Arial,sans-serif">LangChain Harness 优化实验：同一模型，不同 Harness</text>
  <text x="450" y="60" text-anchor="middle" fill="#aaa" font-size="13" font-family="Arial,sans-serif">Terminal Bench 2.0 | 模型：gpt-5.2-codex（全程不变）</text>
  <!-- Y axis -->
  <line x1="100" y1="80" x2="100" y2="330" stroke="#555" stroke-width="1"/>
  <text x="50" y="200" text-anchor="middle" fill="#aaa" font-size="12" font-family="Arial,sans-serif" transform="rotate(-90,50,200)">得分 (%)</text>
  <!-- Y axis labels -->
  <text x="90" y="330" text-anchor="end" fill="#888" font-size="11" font-family="Arial,sans-serif">0%</text>
  <text x="90" y="255" text-anchor="end" fill="#888" font-size="11" font-family="Arial,sans-serif">30%</text>
  <text x="90" y="180" text-anchor="end" fill="#888" font-size="11" font-family="Arial,sans-serif">60%</text>
  <text x="90" y="105" text-anchor="end" fill="#888" font-size="11" font-family="Arial,sans-serif">90%</text>
  <!-- Grid lines -->
  <line x1="100" y1="255" x2="850" y2="255" stroke="#ffffff11" stroke-width="1"/>
  <line x1="100" y1="180" x2="850" y2="180" stroke="#ffffff11" stroke-width="1"/>
  <line x1="100" y1="105" x2="850" y2="105" stroke="#ffffff11" stroke-width="1"/>
  <!-- Bar 1: Baseline -->
  <rect x="170" y="191" width="120" height="139" rx="6" fill="url(#bar1)" filter="url(#sh4)"/>
  <text x="230" y="183" text-anchor="middle" fill="#ff6b6b" font-size="18" font-weight="bold" font-family="Arial,sans-serif">52.8%</text>
  <text x="230" y="350" text-anchor="middle" fill="#ccc" font-size="12" font-family="Arial,sans-serif">基础 Harness</text>
  <text x="230" y="367" text-anchor="middle" fill="#888" font-size="10" font-family="Arial,sans-serif">排名 30+</text>
  <!-- Bar 2: Full xhigh reasoning -->
  <rect x="390" y="198" width="120" height="132" rx="6" fill="url(#bar3)" filter="url(#sh4)"/>
  <text x="450" y="190" text-anchor="middle" fill="#ffd43b" font-size="18" font-weight="bold" font-family="Arial,sans-serif">53.9%</text>
  <text x="450" y="350" text-anchor="middle" fill="#ccc" font-size="12" font-family="Arial,sans-serif">全程 xhigh 推理</text>
  <text x="450" y="367" text-anchor="middle" fill="#888" font-size="10" font-family="Arial,sans-serif">超时反而更差</text>
  <!-- Bar 3: Optimized Harness -->
  <rect x="610" y="155" width="120" height="175" rx="6" fill="url(#bar2)" filter="url(#sh4)"/>
  <text x="670" y="147" text-anchor="middle" fill="#51cf66" font-size="18" font-weight="bold" font-family="Arial,sans-serif">66.5%</text>
  <text x="670" y="350" text-anchor="middle" fill="#ccc" font-size="12" font-family="Arial,sans-serif">优化后 Harness</text>
  <text x="670" y="367" text-anchor="middle" fill="#51cf66" font-size="11" font-weight="bold" font-family="Arial,sans-serif">排名前 5 🏆</text>
  <!-- Annotation arrow -->
  <path d="M 310 185 Q 380 130 440 145" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="380" y="120" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial,sans-serif">推理越多 ≠ 越好</text>
  <path d="M 500 155 Q 560 110 630 140" fill="none" stroke="#51cf66" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="570" y="100" text-anchor="middle" fill="#51cf66" font-size="11" font-family="Arial,sans-serif">+13.7% 纯靠 Harness</text>
  <!-- Bottom note -->
  <text x="450" y="395" text-anchor="middle" fill="#888" font-size="11" font-family="Arial,sans-serif">来源：LangChain Blog, "Improving Deep Agents with Harness Engineering", 2026</text>
</svg>
