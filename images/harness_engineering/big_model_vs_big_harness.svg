<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0c29"/>
    </linearGradient>
    <filter id="sh5">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="900" height="440" fill="url(#bg5)" rx="16"/>
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold" font-family="Arial,sans-serif">Big Model vs Big Harness：行业大辩论</text>
  <text x="450" y="60" text-anchor="middle" fill="#888" font-size="12" font-family="Arial,sans-serif">来源：Latent Space "Is Harness Engineering Real?", 2026.03</text>
  <!-- VS circle -->
  <circle cx="450" cy="230" r="30" fill="#ffd700" opacity="0.9"/>
  <text x="450" y="236" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold" font-family="Arial,sans-serif">VS</text>
  <!-- Left: Big Model -->
  <rect x="30" y="85" width="370" height="320" rx="14" fill="#e9456022" stroke="#e94560" stroke-width="2" filter="url(#sh5)"/>
  <text x="215" y="118" text-anchor="middle" fill="#e94560" font-size="18" font-weight="bold" font-family="Arial,sans-serif">🧠 Big Model 派</text>
  <text x="215" y="143" text-anchor="middle" fill="#aaa" font-size="12" font-family="Arial,sans-serif">「模型够强，框架多余」</text>
  <line x1="60" y1="158" x2="370" y2="158" stroke="#e9456044" stroke-width="1"/>
  <!-- Supporters -->
  <text x="60" y="185" fill="#e94560" font-size="13" font-weight="bold" font-family="Arial,sans-serif">代表人物</text>
  <text x="60" y="208" fill="#ccc" font-size="12" font-family="Arial,sans-serif">• Anthropic Claude Code 团队 (Boris Cherny)</text>
  <text x="60" y="228" fill="#ccc" font-size="12" font-family="Arial,sans-serif">• OpenAI Noam Brown</text>
  <!-- Arguments -->
  <text x="60" y="258" fill="#e94560" font-size="13" font-weight="bold" font-family="Arial,sans-serif">核心论点</text>
  <text x="60" y="281" fill="#ccc" font-size="11" font-family="Arial,sans-serif">• Claude Code = 模型上最薄的包装</text>
  <text x="60" y="301" fill="#ccc" font-size="11" font-family="Arial,sans-serif">• 推理模型出现后，脚手架适得其反</text>
  <text x="60" y="321" fill="#ccc" font-size="11" font-family="Arial,sans-serif">• 每 3-4 周重写一次代码，靠模型迭代</text>
  <!-- Evidence -->
  <text x="60" y="351" fill="#e94560" font-size="13" font-weight="bold" font-family="Arial,sans-serif">数据支持</text>
  <text x="60" y="374" fill="#ccc" font-size="11" font-family="Arial,sans-serif">• METR 测试：框架差异在误差范围内</text>
  <text x="60" y="394" fill="#ccc" font-size="11" font-family="Arial,sans-serif">• Scale AI SWE-Atlas 结果不一致</text>
  <!-- Right: Big Harness -->
  <rect x="500" y="85" width="370" height="320" rx="14" fill="#43e97b22" stroke="#43e97b" stroke-width="2" filter="url(#sh5)"/>
  <text x="685" y="118" text-anchor="middle" fill="#43e97b" font-size="18" font-weight="bold" font-family="Arial,sans-serif">🏗️ Big Harness 派</text>
  <text x="685" y="143" text-anchor="middle" fill="#aaa" font-size="12" font-family="Arial,sans-serif">「框架决定你能榨出多少价值」</text>
  <line x1="530" y1="158" x2="840" y2="158" stroke="#43e97b44" stroke-width="1"/>
  <!-- Supporters -->
  <text x="530" y="185" fill="#43e97b" font-size="13" font-weight="bold" font-family="Arial,sans-serif">代表人物</text>
  <text x="530" y="208" fill="#ccc" font-size="12" font-family="Arial,sans-serif">• LlamaIndex Jerry Liu</text>
  <text x="530" y="228" fill="#ccc" font-size="12" font-family="Arial,sans-serif">• LangChain 团队</text>
  <!-- Arguments -->
  <text x="530" y="258" fill="#43e97b" font-size="13" font-weight="bold" font-family="Arial,sans-serif">核心论点</text>
  <text x="530" y="281" fill="#ccc" font-size="11" font-family="Arial,sans-serif">• "Model Harness is Everything"</text>
  <text x="530" y="301" fill="#ccc" font-size="11" font-family="Arial,sans-serif">• 所有生产级 Agent 收敛在同一循环</text>
  <text x="530" y="321" fill="#ccc" font-size="11" font-family="Arial,sans-serif">• Cursor 500亿美元估值 = Harness 的胜利</text>
  <!-- Evidence -->
  <text x="530" y="351" fill="#43e97b" font-size="13" font-weight="bold" font-family="Arial,sans-serif">数据支持</text>
  <text x="530" y="374" fill="#ccc" font-size="11" font-family="Arial,sans-serif">• 一个下午优化框架让 15 个 LLM 全提升</text>
  <text x="530" y="394" fill="#ccc" font-size="11" font-family="Arial,sans-serif">• LangChain: 同模型从 30 名外到前 5</text>
  <!-- Bottom verdict -->
  <rect x="200" y="415" width="500" height="22" rx="8" fill="#ffd70033"/>
  <text x="450" y="431" text-anchor="middle" fill="#ffd700" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Latent Space 结论：Harness Engineering 具有真实价值，AIE Europe 设立专门赛道</text>
</svg>
