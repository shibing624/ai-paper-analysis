name: Build & Deploy MkDocs Site

on:
  push:
    branches: [main]
    paths:
      - "20*/**"
      - "README.md"
      - "scripts/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r scripts/requirements.txt

      - name: Generate docs/ and mkdocs.yml
        run: python scripts/build_mkdocs.py

      - name: Build site
        run: mkdocs build --clean

      - name: Trim search index (fit Cloudflare Pages 25 MiB limit)
        run: python scripts/trim_search_index.py

      - name: Deploy to GitHub Pages (gh-pages branch)
        env:
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: ghp-import -n -p -f -m "Deploy site with trimmed search index" site
